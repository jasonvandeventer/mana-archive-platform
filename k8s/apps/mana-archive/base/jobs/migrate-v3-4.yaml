apiVersion: batch/v1
kind: Job
metadata:
  name: mana-archive-migrate-v3-4
  namespace: mana-archive
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/version: v3.4.0
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: ghcr.io/jasonvandeventer/mana-archive:v3.4.0
          command:
            - python
            - app/scripts/migrate_v3_4_decks_as_locations.py
          env:
            - name: DATA_DIR
              value: /data
            - name: PYTHONPATH
              value: /app
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mana-archive-data-longhorn
