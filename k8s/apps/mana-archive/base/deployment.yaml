kind: Deployment
metadata:
  name: mana-archive
  namespace: mana-archive
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mana-archive
  template:
    metadata:
      labels:
        app: mana-archive
    spec:
      containers:
        - name: mana-archive
          image: ghcr.io/jasonvandeventer/mana-archive
          imagePullPolicy: IfNotPresent
          env:
            - name: DATA_DIR
              value: /data
            - name: SESSION_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mana-archive-secrets
                  key: SESSION_SECRET_KEY
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: mana-archive-data
              mountPath: /data
      volumes:
        - name: mana-archive-data
          persistentVolumeClaim:
            claimName: mana-archive-data-longhorn
