apiVersion: v1
kind: Pod
metadata:
  name: mana-archive-db-helper
  namespace: mana-archive
spec:
  containers:
    - name: helper
      image: alpine:3.20
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: mana-archive-data
  restartPolicy: Never
