apiVersion: v1
kind: Pod
metadata:
  name: mana-archive-storage-migration
  namespace: mana-archive
spec:
  restartPolicy: Never
  containers:
    - name: migrator
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - >
          echo "Old volume:";
          ls -la /old;
          echo "New volume:";
          ls -la /new;
          echo "Copying mana_archive.db...";
          cp -av /old/mana_archive.db /new/mana_archive.db;
          sync;
          echo "Done.";
          echo "New volume after copy:";
          ls -la /new;
          sleep 3600
      volumeMounts:
        - name: old-data
          mountPath: /old
        - name: new-data
          mountPath: /new
  volumes:
    - name: old-data
      persistentVolumeClaim:
        claimName: mana-archive-data
    - name: new-data
      persistentVolumeClaim:
        claimName: mana-archive-data-longhorn
