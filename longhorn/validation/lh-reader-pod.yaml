apiVersion: v1
kind: Pod
metadata:
  name: lh-reader
  namespace: default
spec:
  restartPolicy: Never
  containers:
    - name: reader
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - >
          echo "=== FILE CONTENT ===";
          ls -la /data;
          echo "---";
          cat /data/testfile.txt || echo "file missing";
          echo "=== END ===";
          sleep 3600
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: lh-restore-pvc
